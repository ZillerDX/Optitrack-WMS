services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: optitrack_api
    command:
      [
        "gunicorn",
        "main:app",
        "--workers",
        "2",
        "--worker-class",
        "uvicorn.workers.UvicornWorker",
        "--bind",
        "0.0.0.0:8000",
        "--access-logfile",
        "-",
        "--error-logfile",
        "-",
        "--log-level",
        "info",
      ]
    environment:
      ENVIRONMENT: development
      SECRET_KEY: local-dev-secret-key-change-me-32-chars
      DATABASE_URL: postgresql+asyncpg://postgres:postgrespassword@db:5432/optitrack_wms
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_URL_BASE: http://localhost:9000/optitrack
      S3_REGION: us-east-1
      S3_BUCKET: optitrack
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_USE_PATH_STYLE: "true"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      INIT_DB_ON_STARTUP: "false"
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    restart: unless-stopped

  db-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: optitrack_db_init
    command: ["python", "-m", "scripts.init_db"]
    environment:
      ENVIRONMENT: development
      SECRET_KEY: local-dev-secret-key-change-me-32-chars
      DATABASE_URL: postgresql+asyncpg://postgres:postgrespassword@db:5432/optitrack_wms
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_URL_BASE: http://localhost:9000/optitrack
      S3_REGION: us-east-1
      S3_BUCKET: optitrack
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_USE_PATH_STYLE: "true"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      INIT_DB_ON_STARTUP: "false"
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: optitrack_worker
    command: ["arq", "app.workers.arq_worker.WorkerSettings"]
    environment:
      ENVIRONMENT: development
      SECRET_KEY: local-dev-secret-key-change-me-32-chars
      DATABASE_URL: postgresql+asyncpg://postgres:postgrespassword@db:5432/optitrack_wms
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      STORAGE_BACKEND: s3
      S3_ENDPOINT_URL: http://minio:9000
      S3_PUBLIC_URL_BASE: http://localhost:9000/optitrack
      S3_REGION: us-east-1
      S3_BUCKET: optitrack
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_USE_PATH_STYLE: "true"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    container_name: optitrack_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: optitrack_wms
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d optitrack_wms"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: optitrack_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    container_name: optitrack_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2024-05-09T17-04-24Z
    container_name: optitrack_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/optitrack &&
      mc anonymous set download local/optitrack
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
